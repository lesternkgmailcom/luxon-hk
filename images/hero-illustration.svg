<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#ffffff"/>
  
  <!-- Desk -->
  <rect x="120" y="180" width="160" height="8" rx="4" fill="#e8eaed"/>
  <rect x="155" y="188" width="8" height="60" rx="2" fill="#dadce0"/>
  <rect x="237" y="188" width="8" height="60" rx="2" fill="#dadce0"/>
  
  <!-- Monitor -->
  <rect x="140" y="100" width="120" height="80" rx="8" fill="#f1f3f4" stroke="#dadce0" stroke-width="2"/>
  <rect x="148" y="108" width="104" height="56" rx="4" fill="#ffffff"/>
  <!-- Screen content - chat bubbles -->
  <rect x="156" y="116" width="40" height="10" rx="5" fill="#10b981" opacity="0.3"/>
  <rect x="200" y="130" width="44" height="10" rx="5" fill="#10b981" opacity="0.2"/>
  <rect x="156" y="144" width="36" height="10" rx="5" fill="#10b981" opacity="0.3"/>
  <!-- Monitor stand -->
  <rect x="192" y="180" width="16" height="4" rx="2" fill="#dadce0"/>
  
  <!-- Floating notification bubbles -->
  <!-- Email icon -->
  <g transform="translate(290, 60)">
    <rect width="48" height="36" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
    <rect x="10" y="10" width="28" height="16" rx="2" fill="none" stroke="#10b981" stroke-width="1.2"/>
    <path d="M10 10 L24 20 L38 10" stroke="#10b981" stroke-width="1.2" fill="none"/>
  </g>
  
  <!-- Calendar icon -->
  <g transform="translate(60, 50)">
    <rect width="44" height="44" rx="8" fill="#ffffff" stroke="#5f6368" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
    <rect x="8" y="8" width="28" height="6" rx="2" fill="#5f6368" opacity="0.2"/>
    <rect x="10" y="20" width="8" height="8" rx="2" fill="#10b981" opacity="0.4"/>
    <rect x="22" y="20" width="8" height="8" rx="2" fill="#10b981" opacity="0.3"/>
    <rect x="10" y="32" width="8" height="4" rx="1" fill="#dadce0"/>
    <rect x="22" y="32" width="8" height="4" rx="1" fill="#dadce0"/>
  </g>
  
  <!-- Chat icon -->
  <g transform="translate(310, 140)">
    <rect width="52" height="40" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.08))"/>
    <rect x="10" y="10" width="24" height="5" rx="2.5" fill="#10b981" opacity="0.3"/>
    <rect x="10" y="19" width="32" height="5" rx="2.5" fill="#10b981" opacity="0.2"/>
    <rect x="10" y="28" width="18" height="5" rx="2.5" fill="#10b981" opacity="0.15"/>
  </g>
  
  <!-- Sparkle dots -->
  <circle cx="330" cy="50" r="3" fill="#10b981" opacity="0.4"/>
  <circle cx="80" cy="120" r="2" fill="#10b981" opacity="0.3"/>
  <circle cx="350" cy="200" r="2.5" fill="#10b981" opacity="0.25"/>
  <circle cx="50" cy="200" r="2" fill="#10b981" opacity="0.2"/>
</svg>
