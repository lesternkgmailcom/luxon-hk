<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" fill="none">
  <rect width="640" height="340" rx="16" fill="#f8faf9"/>
  
  <!-- Morning briefing card -->
  <rect x="60" y="20" width="520" height="300" rx="16" fill="#ffffff" stroke="#e8eaed" stroke-width="1.5"/>
  
  <!-- Header bar -->
  <rect x="60" y="20" width="520" height="44" rx="16" fill="#f0fdf4"/>
  <rect x="60" y="48" width="520" height="16" fill="#f0fdf4"/>
  
  <!-- Sun icon -->
  <circle cx="90" cy="42" r="12" fill="#f59e0b" opacity="0.15"/>
  <circle cx="90" cy="42" r="6" fill="#f59e0b" opacity="0.4"/>
  <line x1="90" y1="26" x2="90" y2="22" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="78" y1="34" x2="75" y2="31" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="102" y1="34" x2="105" y2="31" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  
  <text x="110" y="40" font-size="14" fill="#1a1a1a" font-family="sans-serif" font-weight="700">Daily Briefing</text>
  <text x="110" y="52" font-size="8" fill="#80868b" font-family="sans-serif">Good morning — here's your day at a glance</text>
  
  <!-- 4 metric cards in 2x2 grid -->
  <!-- Card 1: New Leads -->
  <rect x="84" y="80" width="230" height="72" rx="12" fill="#f8faf9" stroke="#e8eaed" stroke-width="1"/>
  <circle cx="108" cy="104" r="14" fill="#10b981" opacity="0.1"/>
  <path d="M102 104 L108 98 L114 104 M108 98 L108 112" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="130" y="100" font-size="11" fill="#1a1a1a" font-family="sans-serif" font-weight="600">3 new leads</text>
  <text x="130" y="112" font-size="8" fill="#80868b" font-family="sans-serif">from website &amp; WhatsApp</text>
  <rect x="130" y="122" width="140" height="5" rx="2" fill="#10b981" opacity="0.15"/>
  <rect x="130" y="122" width="84" height="5" rx="2" fill="#10b981" opacity="0.3"/>
  
  <!-- Card 2: Overdue -->
  <rect x="330" y="80" width="230" height="72" rx="12" fill="#f8faf9" stroke="#e8eaed" stroke-width="1"/>
  <circle cx="354" cy="104" r="14" fill="#f59e0b" opacity="0.1"/>
  <text x="354" y="109" font-size="14" fill="#f59e0b" text-anchor="middle" font-family="sans-serif" font-weight="700">$</text>
  <text x="376" y="100" font-size="11" fill="#1a1a1a" font-family="sans-serif" font-weight="600">2 overdue invoices</text>
  <text x="376" y="112" font-size="8" fill="#80868b" font-family="sans-serif">HK$45,000 pending</text>
  <rect x="376" y="122" width="140" height="5" rx="2" fill="#f59e0b" opacity="0.12"/>
  <rect x="376" y="122" width="56" height="5" rx="2" fill="#f59e0b" opacity="0.3"/>
  
  <!-- Card 3: Meetings -->
  <rect x="84" y="166" width="230" height="72" rx="12" fill="#f8faf9" stroke="#e8eaed" stroke-width="1"/>
  <circle cx="108" cy="190" r="14" fill="#5f6368" opacity="0.06"/>
  <rect x="100" y="184" width="16" height="12" rx="2" fill="none" stroke="#5f6368" stroke-width="1.2" opacity="0.4"/>
  <line x1="100" y1="188" x2="116" y2="188" stroke="#5f6368" stroke-width="0.8" opacity="0.3"/>
  <text x="130" y="186" font-size="11" fill="#1a1a1a" font-family="sans-serif" font-weight="600">2 meetings today</text>
  <text x="130" y="198" font-size="8" fill="#80868b" font-family="sans-serif">10:00 AM — Strategy review</text>
  <text x="130" y="208" font-size="8" fill="#80868b" font-family="sans-serif">3:00 PM — Client call</text>
  
  <!-- Card 4: Tasks -->
  <rect x="330" y="166" width="230" height="72" rx="12" fill="#f8faf9" stroke="#e8eaed" stroke-width="1"/>
  <circle cx="354" cy="190" r="14" fill="#10b981" opacity="0.1"/>
  <path d="M348 190 L352 194 L360 186" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="376" y="186" font-size="11" fill="#1a1a1a" font-family="sans-serif" font-weight="600">5 tasks pending</text>
  <text x="376" y="198" font-size="8" fill="#80868b" font-family="sans-serif">2 high priority</text>
  <rect x="376" y="208" width="140" height="5" rx="2" fill="#1a1a1a" opacity="0.06"/>
  <rect x="376" y="208" width="56" height="5" rx="2" fill="#10b981" opacity="0.3"/>
  
  <!-- Source badges at bottom -->
  <rect x="120" y="256" width="56" height="20" rx="10" fill="#ffffff" stroke="#e8eaed" stroke-width="1"/>
  <text x="148" y="270" font-size="8" fill="#5f6368" text-anchor="middle" font-family="sans-serif">📧 Mail</text>
  <rect x="188" y="256" width="72" height="20" rx="10" fill="#ffffff" stroke="#e8eaed" stroke-width="1"/>
  <text x="224" y="270" font-size="8" fill="#5f6368" text-anchor="middle" font-family="sans-serif">📅 Calendar</text>
  <rect x="272" y="256" width="72" height="20" rx="10" fill="#ffffff" stroke="#e8eaed" stroke-width="1"/>
  <text x="308" y="270" font-size="8" fill="#5f6368" text-anchor="middle" font-family="sans-serif">📊 Sheets</text>
  <rect x="356" y="256" width="72" height="20" rx="10" fill="#ffffff" stroke="#e8eaed" stroke-width="1"/>
  <text x="392" y="270" font-size="8" fill="#5f6368" text-anchor="middle" font-family="sans-serif">💬 Chat</text>
</svg>
