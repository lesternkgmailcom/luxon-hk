<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" fill="none">
  <rect width="640" height="340" rx="16" fill="#f8faf9"/>
  
  <!-- Phone centered -->
  <rect x="240" y="30" width="160" height="280" rx="24" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="252" y="54" width="136" height="240" rx="4" fill="#f0fdf4"/>
  
  <!-- Status bar -->
  <text x="320" y="46" font-size="8" fill="#5f6368" text-anchor="middle" font-family="sans-serif">9:41</text>
  
  <!-- Chat header -->
  <rect x="252" y="54" width="136" height="28" rx="4" fill="#ffffff"/>
  <circle cx="270" cy="68" r="8" fill="#10b981" opacity="0.2"/>
  <rect x="282" y="63" width="48" height="5" rx="2" fill="#1a1a1a" opacity="0.2"/>
  <rect x="282" y="71" width="32" height="3" rx="1" fill="#1a1a1a" opacity="0.08"/>
  
  <!-- Incoming message (left) -->
  <rect x="260" y="92" width="90" height="24" rx="12" fill="#ffffff" stroke="#e8eaed" stroke-width="1"/>
  <rect x="272" y="100" width="60" height="5" rx="2" fill="#1a1a1a" opacity="0.2"/>
  <rect x="272" y="108" width="40" height="3" rx="1" fill="#1a1a1a" opacity="0.08"/>
  
  <!-- AI reply (right, green) -->
  <rect x="300" y="128" width="80" height="24" rx="12" fill="#10b981" opacity="0.15"/>
  <rect x="312" y="136" width="52" height="5" rx="2" fill="#10b981" opacity="0.5"/>
  <rect x="312" y="144" width="36" height="3" rx="1" fill="#10b981" opacity="0.2"/>
  
  <!-- Another incoming -->
  <rect x="260" y="164" width="100" height="24" rx="12" fill="#ffffff" stroke="#e8eaed" stroke-width="1"/>
  <rect x="272" y="172" width="70" height="5" rx="2" fill="#1a1a1a" opacity="0.15"/>
  <rect x="272" y="180" width="50" height="3" rx="1" fill="#1a1a1a" opacity="0.06"/>
  
  <!-- AI reply with data -->
  <rect x="280" y="200" width="100" height="36" rx="12" fill="#10b981" opacity="0.15"/>
  <rect x="292" y="210" width="68" height="5" rx="2" fill="#10b981" opacity="0.5"/>
  <rect x="292" y="219" width="52" height="4" rx="2" fill="#10b981" opacity="0.25"/>
  <rect x="292" y="227" width="40" height="3" rx="1" fill="#10b981" opacity="0.15"/>
  
  <!-- Typing indicator -->
  <circle cx="272" cy="252" r="3" fill="#10b981" opacity="0.3"/>
  <circle cx="282" cy="252" r="3" fill="#10b981" opacity="0.2"/>
  <circle cx="292" cy="252" r="3" fill="#10b981" opacity="0.1"/>
  
  <!-- Home indicator -->
  <rect x="290" y="292" width="60" height="4" rx="2" fill="#1a1a1a" opacity="0.1"/>
  
  <!-- Floating badges on right side -->
  <rect x="440" y="60" width="130" height="44" rx="10" fill="#ffffff" stroke="#e8eaed" stroke-width="1.5"/>
  <circle cx="460" cy="82" r="10" fill="#10b981" opacity="0.12"/>
  <path d="M456 82 L460 86 L466 78" stroke="#10b981" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <rect x="476" y="74" width="60" height="5" rx="2" fill="#1a1a1a" opacity="0.2"/>
  <rect x="476" y="83" width="42" height="3" rx="1" fill="#1a1a1a" opacity="0.08"/>
  
  <rect x="440" y="120" width="130" height="44" rx="10" fill="#ffffff" stroke="#e8eaed" stroke-width="1.5"/>
  <circle cx="460" cy="142" r="10" fill="#1a1a1a" opacity="0.06"/>
  <path d="M455 138 L465 138 M455 142 L465 142 M455 146 L460 146" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <rect x="476" y="134" width="60" height="5" rx="2" fill="#1a1a1a" opacity="0.2"/>
  <rect x="476" y="143" width="48" height="3" rx="1" fill="#1a1a1a" opacity="0.08"/>
  
  <!-- Floating badges on left side -->
  <rect x="60" y="80" width="130" height="44" rx="10" fill="#ffffff" stroke="#e8eaed" stroke-width="1.5"/>
  <circle cx="82" cy="102" r="10" fill="#1a1a1a" opacity="0.06"/>
  <path d="M78 98 L86 98 M78 102 L86 102 M78 106 L82 106" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <rect x="98" y="94" width="60" height="5" rx="2" fill="#1a1a1a" opacity="0.2"/>
  <rect x="98" y="103" width="42" height="3" rx="1" fill="#1a1a1a" opacity="0.08"/>
  
  <!-- Real-time badge -->
  <rect x="440" y="200" width="100" height="28" rx="14" fill="#1a1a1a"/>
  <text x="490" y="219" font-size="11" fill="#10b981" text-anchor="middle" font-family="sans-serif" font-weight="600">Real-time</text>
</svg>
