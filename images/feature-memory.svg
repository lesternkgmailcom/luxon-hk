<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" fill="none">
  <rect width="640" height="340" rx="16" fill="#f8faf9"/>
  
  <!-- Central brain node -->
  <circle cx="320" cy="140" r="50" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <circle cx="320" cy="140" r="28" fill="#10b981" opacity="0.12"/>
  <circle cx="320" cy="140" r="12" fill="#10b981" opacity="0.3"/>
  
  <!-- Connection lines to outer nodes -->
  <line x1="272" y1="120" x2="160" y2="80" stroke="#10b981" stroke-width="1.5" opacity="0.25"/>
  <line x1="368" y1="120" x2="480" y2="80" stroke="#10b981" stroke-width="1.5" opacity="0.25"/>
  <line x1="272" y1="160" x2="140" y2="200" stroke="#10b981" stroke-width="1.5" opacity="0.25"/>
  <line x1="368" y1="160" x2="500" y2="200" stroke="#10b981" stroke-width="1.5" opacity="0.25"/>
  <line x1="320" y1="190" x2="320" y2="260" stroke="#10b981" stroke-width="1.5" opacity="0.25"/>
  
  <!-- Outer memory nodes -->
  <!-- Top left - conversation -->
  <circle cx="140" cy="70" r="30" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="122" y="58" width="36" height="5" rx="2" fill="#1a1a1a" opacity="0.15"/>
  <rect x="122" y="67" width="28" height="4" rx="2" fill="#10b981" opacity="0.3"/>
  <rect x="122" y="76" width="32" height="4" rx="2" fill="#1a1a1a" opacity="0.08"/>
  
  <!-- Top right - analysis -->
  <circle cx="500" cy="70" r="30" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M486 70 L500 56 L514 70 M500 56 L500 84" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Bottom left - context -->
  <rect x="100" y="180" width="80" height="50" rx="10" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="112" y="194" width="40" height="4" rx="2" fill="#10b981" opacity="0.3"/>
  <rect x="112" y="202" width="56" height="4" rx="2" fill="#1a1a1a" opacity="0.1"/>
  <rect x="112" y="210" width="32" height="4" rx="2" fill="#1a1a1a" opacity="0.06"/>
  
  <!-- Bottom right - insights -->
  <rect x="460" y="180" width="80" height="50" rx="10" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="472" y="194" width="40" height="4" rx="2" fill="#10b981" opacity="0.3"/>
  <rect x="472" y="202" width="48" height="4" rx="2" fill="#1a1a1a" opacity="0.1"/>
  <rect x="472" y="210" width="28" height="4" rx="2" fill="#1a1a1a" opacity="0.06"/>
  
  <!-- Bottom center - summary output -->
  <rect x="270" y="250" width="100" height="44" rx="10" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="284" y="264" width="52" height="5" rx="2" fill="#10b981" opacity="0.4"/>
  <rect x="284" y="274" width="72" height="4" rx="2" fill="#1a1a1a" opacity="0.12"/>
  
  <!-- Small floating dots -->
  <circle cx="220" cy="100" r="4" fill="#10b981" opacity="0.2"/>
  <circle cx="420" cy="100" r="4" fill="#10b981" opacity="0.2"/>
  <circle cx="240" cy="200" r="3" fill="#10b981" opacity="0.15"/>
  <circle cx="400" cy="200" r="3" fill="#10b981" opacity="0.15"/>
</svg>
