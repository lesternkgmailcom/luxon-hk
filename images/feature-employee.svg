<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" fill="none">
  <rect width="640" height="340" rx="16" fill="#f8faf9"/>
  
  <!-- Desk/monitor -->
  <rect x="220" y="40" width="200" height="140" rx="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="232" y="52" width="176" height="116" rx="6" fill="#f0fdf4"/>
  
  <!-- Robot face on screen -->
  <rect x="290" y="72" width="60" height="50" rx="16" fill="#1a1a1a"/>
  <circle cx="308" cy="92" r="6" fill="#10b981"/>
  <circle cx="332" cy="92" r="6" fill="#10b981"/>
  <path d="M302 105 Q320 114 338 105" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Antenna -->
  <line x1="320" y1="72" x2="320" y2="56" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="320" cy="52" r="5" fill="#10b981"/>
  
  <!-- Notification bubbles floating -->
  <g>
    <rect x="440" y="50" width="120" height="32" rx="16" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="460" cy="66" r="8" fill="#10b981" opacity="0.15"/>
    <rect x="474" y="60" width="50" height="5" rx="2" fill="#1a1a1a" opacity="0.15"/>
    <rect x="474" y="69" width="36" height="4" rx="2" fill="#1a1a1a" opacity="0.08"/>
  </g>
  <g>
    <rect x="80" y="60" width="110" height="32" rx="16" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="96" y="70" width="60" height="5" rx="2" fill="#10b981" opacity="0.4"/>
    <rect x="96" y="79" width="40" height="4" rx="2" fill="#1a1a1a" opacity="0.1"/>
  </g>
  
  <!-- Connection lines from screen to bubbles -->
  <path d="M420 80 Q435 65 440 66" stroke="#10b981" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <path d="M220 80 Q205 70 190 76" stroke="#10b981" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  
  <!-- Monitor stand -->
  <rect x="300" y="180" width="40" height="20" rx="2" fill="#1a1a1a" opacity="0.15"/>
  <rect x="280" y="200" width="80" height="6" rx="3" fill="#1a1a1a" opacity="0.1"/>
  
  <!-- Floating action items below -->
  <g>
    <rect x="100" y="230" width="140" height="56" rx="12" fill="#ffffff" stroke="#e8eaed" stroke-width="1.5"/>
    <circle cx="122" cy="250" r="8" fill="#10b981" opacity="0.12"/>
    <path d="M118 250 L121 253 L127 247" stroke="#10b981" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <rect x="138" y="246" width="60" height="5" rx="2" fill="#1a1a1a" opacity="0.2"/>
    <rect x="138" y="257" width="80" height="4" rx="2" fill="#1a1a1a" opacity="0.08"/>
  </g>
  <g>
    <rect x="260" y="230" width="140" height="56" rx="12" fill="#ffffff" stroke="#e8eaed" stroke-width="1.5"/>
    <circle cx="282" cy="250" r="8" fill="#10b981" opacity="0.12"/>
    <path d="M278 250 L281 253 L287 247" stroke="#10b981" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <rect x="298" y="246" width="60" height="5" rx="2" fill="#1a1a1a" opacity="0.2"/>
    <rect x="298" y="257" width="72" height="4" rx="2" fill="#1a1a1a" opacity="0.08"/>
  </g>
  <g>
    <rect x="420" y="230" width="140" height="56" rx="12" fill="#ffffff" stroke="#e8eaed" stroke-width="1.5"/>
    <circle cx="442" cy="250" r="8" fill="#10b981" opacity="0.12"/>
    <path d="M438 250 L441 253 L447 247" stroke="#10b981" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <rect x="458" y="246" width="60" height="5" rx="2" fill="#1a1a1a" opacity="0.2"/>
    <rect x="458" y="257" width="68" height="4" rx="2" fill="#1a1a1a" opacity="0.08"/>
  </g>
  
  <!-- "24/7" badge -->
  <rect x="530" y="140" width="70" height="28" rx="14" fill="#1a1a1a"/>
  <text x="565" y="159" font-size="12" fill="#10b981" text-anchor="middle" font-family="sans-serif" font-weight="700">24/7</text>
</svg>
